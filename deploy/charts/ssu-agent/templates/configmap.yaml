apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ssu-agent.fullname" . }}-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "ssu-agent.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
data:
  SSUMCP_URL: {{ .Values.env.ssumcpUrl | quote }}
  ALLOWED_ORIGINS: {{ .Values.env.allowedOrigins | quote }}
