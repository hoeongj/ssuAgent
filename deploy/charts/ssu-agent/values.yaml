namespace: ssuai-prod
replicaCount: 1
image:
  repository: ghcr.io/ghdtjdwn/ssuagent
  tag: sha-ecb07e782e561b6d8750f0e6a783672f773d9b77
  pullPolicy: Always
nameOverride: ""
fullnameOverride: ""
env:
  ssumcpUrl: "https://ssumcp.duckdns.org/mcp"
  # CORS allow-list for /agent/* (browser calls from the Vercel frontend). Was
  # unset -> config.py defaulted to "*"; pinned to the prod frontend origin to
  # match ssuMCP's SSUAI_FRONTEND_ORIGIN. ADR 0009 / S1.
  allowedOrigins: "https://ssuai.vercel.app"
secretRef:
  enabled: true
  name: ssuagent-secrets
  optional: true
secretTemplate:
  enabled: false
  stringData:
    GOOGLE_API_KEY: "<replace-me>"
    DATABASE_URL: "postgresql://ssuai:<db-password>@postgres-service:5432/ssuai"
service:
  type: ClusterIP
  port: 8000
ingress:
  enabled: true
  className: traefik
  host: ssuagent.duckdns.org
  tlsSecretName: ssuagent-duckdns-org-tls
  clusterIssuer: letsencrypt-prod
  middlewares:
    redirectHttps: redirect-https
    hsts: hsts
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
probes:
  readiness:
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3
  liveness:
    path: /health
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 5
containerSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
    - ALL
podSecurityContext:
  terminationGracePeriodSeconds: 30
  seccompProfile:
    type: RuntimeDefault
