namespace: ssuai-prod
replicaCount: 1
image:
  repository: ghcr.io/hoeongj/ssuagent
  tag: sha-b6a1190df0a7a16082a413903f15739eabb00c3a
  pullPolicy: Always
nameOverride: ""
fullnameOverride: ""
env:
  ssumcpUrl: "https://ssumcp.duckdns.org/mcp"
secretRef:
  enabled: true
  name: ssuagent-secrets
  optional: true
secretTemplate:
  enabled: false
  stringData:
    GOOGLE_API_KEY: "<replace-me>"
    DATABASE_URL: "postgresql://ssuai:<db-password>@postgres-service:5432/ssuai"
service:
  type: ClusterIP
  port: 8000
ingress:
  enabled: true
  className: traefik
  host: ssuagent.duckdns.org
  tlsSecretName: ssuagent-duckdns-org-tls
  clusterIssuer: letsencrypt-prod
  middlewares:
    redirectHttps: redirect-https
    hsts: hsts
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
probes:
  readiness:
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3
  liveness:
    path: /health
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 5
containerSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
    - ALL
podSecurityContext:
  terminationGracePeriodSeconds: 30
